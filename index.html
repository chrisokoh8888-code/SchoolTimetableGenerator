<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Timetable Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">
  <h1>School Timetable Generator</h1>
  <p class="sub">Create and manage school timetables easily</p>

  <div class="tabs">
    <button class="tab active" data-tab="setup">Setup</button>
    <button class="tab" data-tab="breaks">Breaks</button>
    <button class="tab" data-tab="availability">Availability</button>
    <button class="tab" data-tab="timetable">Timetable</button>
    <button class="tab" data-tab="conflicts">Conflicts</button>
  </div>

  <!-- SETUP -->
  <div id="setup" class="panel active">
    <h3>Add Subject</h3>
    <input id="subjectName" placeholder="Subject name">
    <input id="subjectPeriods" type="number" value="5">
    <button onclick="addSubject()">Add</button>
    <ul id="subjectList"></ul>

    <h3>Add Teacher</h3>
    <input id="teacherName" placeholder="Teacher name">
    <select id="teacherSubject"></select>
    <button onclick="addTeacher()">Add</button>
    <ul id="teacherList"></ul>

    <h3>Add Class</h3>
    <input id="className" placeholder="Class name">
    <button onclick="addClass()">Add</button>
    <ul id="classList"></ul>
  </div>

  <!-- BREAKS -->
  <div id="breaks" class="panel">
    <h3>Break Periods</h3>
    <p>Enter period numbers separated by comma (e.g 3,5)</p>
    <input id="breakInput">
    <button onclick="saveBreaks()">Save</button>
  </div>

  <!-- AVAILABILITY -->
  <div id="availability" class="panel">
    <h3>Teacher Availability</h3>
    <select id="availTeacher"></select>
    <div id="availabilityGrid"></div>
  </div>

  <!-- TIMETABLE -->
  <div id="timetable" class="panel">
    <button onclick="generateTimetable()">Generate Timetable</button>
    <div id="timetableView"></div>
  </div>

  <!-- CONFLICTS -->
  <div id="conflicts" class="panel">
    <div id="conflictView"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
